name: Deploy Backend To VDS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Serialize deploys: two close pushes to main must not race each other over
# the shared staging dir / live-dir swap on the VDS.
concurrency:
  group: backend-vds-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.VDS_HOST }}" ]; then echo "Missing secret: VDS_HOST"; exit 1; fi
          if [ -z "${{ secrets.VDS_PORT }}" ]; then echo "Missing secret: VDS_PORT"; exit 1; fi
          if [ -z "${{ secrets.VDS_USER }}" ]; then echo "Missing secret: VDS_USER"; exit 1; fi
          if [ -z "${{ secrets.VDS_SSH_PRIVATE_KEY || secrets.VDS }}" ]; then echo "Missing secret: VDS_SSH_PRIVATE_KEY (or VDS fallback)"; exit 1; fi

      - name: Checkout
        uses: actions/checkout@v4

      # Sources go to a STAGING dir, not the live one. The old deploy scheme
      # (scp rm:true straight into /opt/blog-app/backend, then install+build
      # in place) wiped .next under the running `next start`: routes not yet
      # in Node's require cache 500'd with MODULE_NOT_FOUND for the whole
      # install+build window (~2-3 min per deploy). On 2026-07-03 a Vercel
      # frontend build ran inside that window, every /post/[id] prerender got
      # a 500 → notFound(), and the site shipped with all posts as 404s.
      - name: Upload backend sources to VDS (staging dir)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_PRIVATE_KEY || secrets.VDS }}
          port: ${{ secrets.VDS_PORT }}
          source: '.'
          target: '/opt/blog-app/backend-staging'
          rm: true
          strip_components: 0

      - name: Build in staging, swap, restart backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_PRIVATE_KEY || secrets.VDS }}
          port: ${{ secrets.VDS_PORT }}
          # script_stop makes the action fail the step on any non-zero command.
          # Without it, appleboy/ssh-action only checks the LAST command's exit
          # code, so a failed `yarn build` followed by `systemctl restart` would
          # report success — exactly the silent-restart-on-broken-build bug that
          # shipped 500-ing routes on 2026-06-21. `set -e` alone is not enough.
          script_stop: true
          script: |
            set -euo pipefail
            LIVE=/opt/blog-app/backend
            STAGING=/opt/blog-app/backend-staging
            OLD=/opt/blog-app/backend-old

            cd "$STAGING"
            find . -name "._*" -delete
            cp /opt/blog-backend/.env.production "$STAGING/.env"
            corepack enable
            corepack prepare yarn@1.22.22 --activate

            # Seed node_modules from the live dir as hardlinks: near-free on
            # disk/time, and yarn v1 replaces changed files by unlink+extract,
            # so the live copies are never mutated through the shared inodes.
            if [ -d "$LIVE/node_modules" ]; then
              cp -al "$LIVE/node_modules" "$STAGING/node_modules"
            fi
            yarn install --frozen-lockfile

            # Build in staging while the live service keeps serving the old
            # .next untouched. A failed build leaves prod exactly as it was.
            if ! yarn build; then
              echo "BUILD FAILED — live service untouched, not restarting"
              exit 1
            fi

            # Swap: two renames on the same filesystem. The old process keeps
            # serving from the renamed dir (cwd and require cache follow the
            # inode) until systemd restarts it into the new one, so the
            # user-visible gap is just the restart (~1s), not the build.
            rm -rf "$OLD"
            mv "$LIVE" "$OLD"
            mv "$STAGING" "$LIVE"
            systemctl restart blog-backend

            # Post-restart healthcheck, else roll back to the previous build
            # and fail the deploy. Two probes on purpose:
            #  - /api/post/list — the service booted and answers at all;
            #  - /api/post/details — a LAZILY-loaded route. A broken/partial
            #    .next passes the list check (hot in the require cache) but
            #    500s here with MODULE_NOT_FOUND — the exact failure mode of
            #    the 2026-07-03 all-posts-404 incident.
            check_health() {
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1:7272/api/post/list || true)
              if [ "$code" != "200" ]; then echo "list probe: got '$code'"; return 1; fi
              post_id=$(curl -s --max-time 5 http://127.0.0.1:7272/api/post/list | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
              if [ -n "$post_id" ]; then
                dcode=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://127.0.0.1:7272/api/post/details?id=$post_id" || true)
                if [ "$dcode" != "200" ]; then echo "details probe ($post_id): got '$dcode'"; return 1; fi
              fi
              return 0
            }
            ok=0
            for i in 1 2 3 4 5 6; do
              if check_health; then ok=1; break; fi
              echo "healthcheck attempt $i failed, retrying in 5s…"
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "HEALTHCHECK FAILED — rolling back to previous build"
              systemctl status blog-backend --no-pager || true
              journalctl -u blog-backend --no-pager -n 40 || true
              rm -rf "$LIVE"
              mv "$OLD" "$LIVE"
              systemctl restart blog-backend
              echo "rollback done, previous build restored"
              exit 1
            fi
            echo "healthcheck OK (200)"
            rm -rf "$OLD"
            systemctl status blog-backend --no-pager
